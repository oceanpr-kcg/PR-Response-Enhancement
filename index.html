<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>해양사고 대응 선택 시스템</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f5f9;
}

/* 상단 */
header{
    background:#003a70;
    color:white;
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* 선택 영역 */
#selector{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

/* 카드 */
.sel-card{
    background:white;
    border-radius:14px;
    padding:25px 10px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.sel-card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

.name{
    font-size:16px;
    font-weight:bold;
}

/* 결과 영역 */
#result{
    margin:20px;
    padding:20px;
    background:white;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    min-height:120px;
}

</style>
</head>

<body>

<header>
🚢 해양사고 대응 유형 선택
</header>

<!-- 선택 카드 -->
<div id="selector">

<div class="sel-card" role="button" tabindex="0" onclick="pickG(0)">
<div class="icon">⛽</div>
<div class="name">선박 충돌</div>
</div>

<div class="sel-card" role="button" tabindex="0" onclick="pickG(1)">
<div class="icon">🔥</div>
<div class="name">선박 화재</div>
</div>

<div class="sel-card" role="button" tabindex="0" onclick="pickG(2)">
<div class="icon">🌊</div>
<div class="name">침수 사고</div>
</div>

<div class="sel-card" role="button" tabindex="0" onclick="pickG(3)">
<div class="icon">🧍</div>
<div class="name">해상 추락</div>
</div>

<div class="sel-card" role="button" tabindex="0" onclick="pickG(4)">
<div class="icon">🛢</div>
<div class="name">해양 오염</div>
</div>

</div>

<!-- 결과 표시 -->
<div id="result">
사고 유형을 선택하세요.
</div>

<script>

/* 사고별 대응 매뉴얼 */
const manuals = [
`
<h3>선박 충돌 대응</h3>
1️⃣ 인명 구조 최우선<br>
2️⃣ 침수 여부 확인<br>
3️⃣ 항행 통제 실시<br>
4️⃣ 상황 전파
`,
`
<h3>선박 화재 대응</h3>
1️⃣ 승선원 대피<br>
2️⃣ 초기 소화 시도<br>
3️⃣ 구조 세력 요청<br>
4️⃣ 폭발 위험 통제
`,
`
<h3>침수 사고 대응</h3>
1️⃣ 배수 작업 실시<br>
2️⃣ 구조 요청<br>
3️⃣ 구명장비 지급<br>
4️⃣ 예인 준비
`,
`
<h3>해상 추락 대응</h3>
1️⃣ 즉시 위치 표식<br>
2️⃣ 구명부환 투척<br>
3️⃣ 수색 패턴 실시<br>
4️⃣ 저체온증 대응
`,
`
<h3>해양 오염 대응</h3>
1️⃣ 오염원 확인<br>
2️⃣ 방제 장비 투입<br>
3️⃣ 확산 차단<br>
4️⃣ 관계기관 통보
`
];


/* 선택 함수 (오류 원인 해결됨) */
function pickG(index){
    const result = document.getElementById("result");
    result.innerHTML = manuals[index];
}

</script>

</body>
</html>
